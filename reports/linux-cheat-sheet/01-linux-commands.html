<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux 前 100 名常用命令速查表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --bg2: #12151e;
  --bg3: #1a1e2e;
  --card: #161a28;
  --card-hover: #1c2136;
  --border: #2a2f44;
  --text: #c8cdd8;
  --text2: #8a90a4;
  --heading: #e8ecf4;
  --accent1: #6ee7b7;
  --accent2: #60a5fa;
  --accent3: #f472b6;
  --accent4: #fbbf24;
  --accent5: #a78bfa;
  --accent6: #fb923c;
  --accent7: #34d399;
  --accent8: #f87171;
  --accent9: #38bdf8;
  --accent10: #e879f9;
  --accent11: #facc15;
  --code-bg: #0f1119;
  --tag-bg: rgba(110,231,183,0.1);
  --tag-text: #6ee7b7;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* === HEADER === */
.hero {
  position: relative;
  padding: 60px 20px 40px;
  text-align: center;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 30% 20%, rgba(110,231,183,0.08), transparent),
    radial-gradient(ellipse 500px 350px at 70% 60%, rgba(96,165,250,0.06), transparent);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  color: var(--heading);
  letter-spacing: -1px;
  position: relative;
}
.hero h1 span { color: var(--accent1); }
.hero p {
  margin-top: 12px;
  color: var(--text2);
  font-size: 1.05rem;
  position: relative;
}
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
  flex-wrap: wrap;
  position: relative;
}
.stat {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--accent2);
}
.stat strong {
  font-size: 1.6rem;
  display: block;
  color: var(--heading);
}

/* === CONTROLS === */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12,14,20,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 16px 10px 42px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg2);
  color: var(--heading);
  font-size: 0.95rem;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent1); }
.search-box::before {
  content: '⌕';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text2);
  font-size: 1.2rem;
}
.filter-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text2);
  font-size: 0.82rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent1); color: var(--accent1); }
.filter-btn.active {
  background: rgba(110,231,183,0.12);
  border-color: var(--accent1);
  color: var(--accent1);
  font-weight: 500;
}

/* === MAIN LAYOUT === */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

/* === CATEGORY SECTION === */
.category {
  margin-bottom: 48px;
}
.category-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.cat-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.category-header h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--heading);
}
.category-header .cat-count {
  margin-left: auto;
  font-size: 0.8rem;
  color: var(--text2);
  background: var(--bg3);
  padding: 3px 10px;
  border-radius: 20px;
}

/* === COMMAND CARDS === */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 14px;
}
@media (max-width: 500px) {
  .cmd-grid { grid-template-columns: 1fr; }
}

.cmd-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  transition: all 0.2s;
  cursor: default;
}
.cmd-card:hover {
  background: var(--card-hover);
  border-color: rgba(110,231,183,0.3);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.cmd-card.hidden { display: none; }

.cmd-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.cmd-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent1);
}
.cmd-badge {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cmd-desc {
  font-size: 0.9rem;
  color: var(--text);
  margin-bottom: 10px;
}
.cmd-opts {
  margin-bottom: 10px;
}
.cmd-opts summary {
  font-size: 0.82rem;
  color: var(--accent2);
  cursor: pointer;
  font-weight: 500;
  user-select: none;
}
.cmd-opts summary:hover { color: var(--accent9); }
.opt-list {
  margin-top: 6px;
  padding-left: 4px;
}
.opt-row {
  display: flex;
  gap: 10px;
  padding: 3px 0;
  font-size: 0.82rem;
  border-bottom: 1px solid rgba(42,47,68,0.5);
}
.opt-row:last-child { border-bottom: none; }
.opt-flag {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent4);
  min-width: 90px;
  flex-shrink: 0;
  font-weight: 500;
}
.opt-desc { color: var(--text2); }

.cmd-example {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--accent9);
  overflow-x: auto;
  white-space: pre;
  position: relative;
}
.cmd-example .prompt { color: var(--accent1); user-select: none; }
.cmd-example .comment { color: var(--text2); font-style: italic; }

/* === BACK TO TOP === */
.back-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent1);
  color: var(--bg);
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(110,231,183,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: transform 0.2s;
}
.back-top:hover { transform: scale(1.1); }
.back-top.show { display: flex; }

/* === FOOTER === */
footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--text2);
  font-size: 0.82rem;
  border-top: 1px solid var(--border);
}

/* animate */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
.cmd-card { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="hero">
  <h1>Linux 常用命令<span>速查表</span></h1>
  <p>涵蓋 100+ 條最常用指令 · 分類整理 · 附參數說明與範例</p>
  <div class="stats-bar">
    <div class="stat"><strong>100+</strong>條指令</div>
    <div class="stat"><strong>11</strong>大分類</div>
    <div class="stat"><strong>500+</strong>參數說明</div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋指令名稱或說明…" />
    </div>
    <div class="filter-btns" id="filterBtns">
      <button class="filter-btn active" data-cat="all">全部</button>
    </div>
  </div>
</div>

<div class="main" id="mainContent"></div>

<button class="back-top" id="backTop" title="回到頂部">↑</button>

<footer>Linux 常用命令速查表 — 以繁體中文整理 · 適用於大多數 Linux 發行版</footer>

<script>
const CATEGORIES = [
  {
    id: 'file-dir', name: '檔案與目錄管理', icon: '📁',
    color: '#6ee7b7',
    commands: [
      { name: 'ls', desc: '列出目錄內容', opts: [
        ['-l','以長格式顯示詳細資訊'], ['-a','顯示所有檔案（含隱藏檔）'], ['-h','以可讀格式顯示檔案大小'], ['-R','遞迴列出子目錄'], ['-t','依修改時間排序'], ['-S','依檔案大小排序']
      ], ex: '$ ls -lah /home' },
      { name: 'cd', desc: '切換工作目錄', opts: [
        ['~','回到家目錄'], ['..','回到上層目錄'], ['-','回到前一個目錄']
      ], ex: '$ cd /var/log' },
      { name: 'pwd', desc: '顯示目前工作目錄的完整路徑', opts: [
        ['-P','顯示實體路徑（解析符號連結）'], ['-L','顯示邏輯路徑']
      ], ex: '$ pwd' },
      { name: 'mkdir', desc: '建立新目錄', opts: [
        ['-p','遞迴建立多層目錄'], ['-m','設定目錄權限'], ['-v','顯示建立過程']
      ], ex: '$ mkdir -p /tmp/a/b/c' },
      { name: 'rmdir', desc: '刪除空目錄', opts: [
        ['-p','遞迴刪除空的父目錄'], ['--ignore-fail','忽略非空目錄錯誤']
      ], ex: '$ rmdir empty_dir' },
      { name: 'cp', desc: '複製檔案或目錄', opts: [
        ['-r','遞迴複製整個目錄'], ['-i','覆蓋前詢問確認'], ['-v','顯示複製過程'], ['-p','保留原始屬性'], ['-u','僅複製較新的檔案']
      ], ex: '$ cp -rv src/ dest/' },
      { name: 'mv', desc: '移動或重新命名檔案', opts: [
        ['-i','覆蓋前詢問'], ['-f','強制覆蓋不詢問'], ['-v','顯示移動過程'], ['-n','不覆蓋已存在檔案']
      ], ex: '$ mv old_name.txt new_name.txt' },
      { name: 'rm', desc: '刪除檔案或目錄', opts: [
        ['-r','遞迴刪除目錄及內容'], ['-f','強制刪除不詢問'], ['-i','每個檔案刪除前確認'], ['-v','顯示刪除過程']
      ], ex: '$ rm -rf /tmp/old_data' },
      { name: 'touch', desc: '建立空檔案或更新時間戳記', opts: [
        ['-a','僅更新存取時間'], ['-m','僅更新修改時間'], ['-t','指定特定時間戳記']
      ], ex: '$ touch newfile.txt' },
      { name: 'ln', desc: '建立連結（硬連結或軟連結）', opts: [
        ['-s','建立符號連結（軟連結）'], ['-f','強制建立，覆蓋已存在連結'], ['-v','顯示建立過程']
      ], ex: '$ ln -s /usr/bin/python3 /usr/bin/python' },
      { name: 'stat', desc: '顯示檔案或檔案系統的詳細狀態', opts: [
        ['-f','顯示檔案系統狀態'], ['-c','自訂輸出格式']
      ], ex: '$ stat myfile.txt' },
      { name: 'file', desc: '辨識檔案類型', opts: [
        ['-i','輸出 MIME 類型'], ['-b','不顯示檔名']
      ], ex: '$ file image.png' },
      { name: 'tree', desc: '以樹狀結構顯示目錄', opts: [
        ['-L n','限制顯示深度為 n 層'], ['-d','僅顯示目錄'], ['-a','包含隱藏檔案']
      ], ex: '$ tree -L 2 /home' },
    ]
  },
  {
    id: 'file-view', name: '檔案檢視與編輯', icon: '📄',
    color: '#60a5fa',
    commands: [
      { name: 'cat', desc: '串接並顯示檔案內容', opts: [
        ['-n','顯示行號'], ['-b','非空白行顯示行號'], ['-s','壓縮連續空白行'], ['-E','在行尾顯示 $']
      ], ex: '$ cat -n config.txt' },
      { name: 'less', desc: '分頁檢視檔案（可前後捲動）', opts: [
        ['-N','顯示行號'], ['-S','不自動換行'], ['/pattern','搜尋字串'], ['q','離開']
      ], ex: '$ less /var/log/syslog' },
      { name: 'more', desc: '分頁檢視檔案（僅能向下捲動）', opts: [
        ['-d','顯示操作提示'], ['-s','壓縮空白行'], ['+n','從第 n 行開始']
      ], ex: '$ more largefile.log' },
      { name: 'head', desc: '顯示檔案開頭部分', opts: [
        ['-n N','顯示前 N 行'], ['-c N','顯示前 N 個位元組']
      ], ex: '$ head -n 20 access.log' },
      { name: 'tail', desc: '顯示檔案結尾部分', opts: [
        ['-n N','顯示最後 N 行'], ['-f','持續追蹤新增內容'], ['-F','同 -f 但會追蹤檔案重建']
      ], ex: '$ tail -f /var/log/syslog' },
      { name: 'nano', desc: '簡易終端文字編輯器', opts: [
        ['-l','顯示行號'], ['-B','備份原始檔案'], ['-m','啟用滑鼠支援']
      ], ex: '$ nano config.yml' },
      { name: 'vi / vim', desc: '進階終端文字編輯器', opts: [
        ['-R','唯讀模式開啟'], ['+n','開啟後跳至第 n 行'], ['-O','分割視窗開啟多檔']
      ], ex: '$ vim +100 script.sh' },
      { name: 'wc', desc: '計算檔案的行數、字數、位元組數', opts: [
        ['-l','僅計算行數'], ['-w','僅計算字數'], ['-c','僅計算位元組數'], ['-m','僅計算字元數']
      ], ex: '$ wc -l *.py' },
      { name: 'diff', desc: '比較兩個檔案的差異', opts: [
        ['-u','以統一格式輸出'], ['-r','遞迴比較目錄'], ['-i','忽略大小寫差異'], ['--color','彩色輸出']
      ], ex: '$ diff -u old.conf new.conf' },
      { name: 'tee', desc: '將標準輸入同時輸出到螢幕與檔案', opts: [
        ['-a','附加到檔案而非覆蓋']
      ], ex: '$ echo "log" | tee -a output.log' },
    ]
  },
  {
    id: 'search', name: '搜尋與篩選', icon: '🔍',
    color: '#f472b6',
    commands: [
      { name: 'grep', desc: '在文字中搜尋符合模式的行', opts: [
        ['-i','忽略大小寫'], ['-r','遞迴搜尋目錄'], ['-n','顯示行號'], ['-v','反向匹配（排除）'], ['-c','僅計算匹配行數'], ['-l','僅顯示檔名'], ['-E','使用延伸正規表示式']
      ], ex: '$ grep -rn "error" /var/log/' },
      { name: 'find', desc: '在目錄結構中搜尋檔案', opts: [
        ['-name','依檔名搜尋'], ['-type','指定類型（f:檔案, d:目錄）'], ['-size','依大小搜尋'], ['-mtime','依修改天數搜尋'], ['-exec','對結果執行命令'], ['-perm','依權限搜尋']
      ], ex: '$ find / -name "*.log" -mtime -7' },
      { name: 'locate', desc: '透過資料庫快速搜尋檔案路徑', opts: [
        ['-i','忽略大小寫'], ['-c','僅顯示匹配數量'], ['-r','使用正規表示式']
      ], ex: '$ locate nginx.conf' },
      { name: 'which', desc: '顯示可執行檔的完整路徑', opts: [
        ['-a','顯示所有匹配的路徑']
      ], ex: '$ which python3' },
      { name: 'whereis', desc: '搜尋命令的二進位檔、原始碼與手冊頁', opts: [
        ['-b','僅搜尋二進位檔'], ['-m','僅搜尋手冊頁'], ['-s','僅搜尋原始碼']
      ], ex: '$ whereis gcc' },
      { name: 'xargs', desc: '將標準輸入轉換為命令列參數', opts: [
        ['-I {}','指定替換字串'], ['-n N','每次傳遞 N 個參數'], ['-P N','平行執行 N 個程序'], ['-0','以 null 字元分隔']
      ], ex: '$ find . -name "*.tmp" | xargs rm' },
    ]
  },
  {
    id: 'text', name: '文字處理', icon: '✂️',
    color: '#fbbf24',
    commands: [
      { name: 'awk', desc: '強大的文字處理與資料擷取工具', opts: [
        ['-F','指定欄位分隔符'], ['-v','定義變數'], ['NR','目前行號'], ['NF','目前欄位數']
      ], ex: "$ awk -F: '{print $1,$3}' /etc/passwd" },
      { name: 'sed', desc: '串流編輯器，用於文字替換與轉換', opts: [
        ['-i','直接修改原檔'], ['-e','執行多條編輯命令'], ['-n','僅輸出處理過的行'], ['s/a/b/g','全域替換 a 為 b']
      ], ex: "$ sed -i 's/old/new/g' file.txt" },
      { name: 'sort', desc: '排序文字行', opts: [
        ['-n','依數值排序'], ['-r','反向排序'], ['-k','依指定欄位排序'], ['-u','去除重複行'], ['-t','指定分隔符']
      ], ex: '$ sort -t: -k3 -n /etc/passwd' },
      { name: 'uniq', desc: '去除或報告相鄰的重複行', opts: [
        ['-c','顯示重複次數'], ['-d','僅顯示重複行'], ['-i','忽略大小寫']
      ], ex: '$ sort data.txt | uniq -c' },
      { name: 'cut', desc: '從每行中擷取特定欄位', opts: [
        ['-d','指定分隔符'], ['-f','指定擷取欄位'], ['-c','依字元位置擷取']
      ], ex: "$ cut -d':' -f1,3 /etc/passwd" },
      { name: 'tr', desc: '轉換或刪除字元', opts: [

      ], ex: "$ echo 'HELLO' | tr '[:upper:]' '[:lower:]'" },
      { name: 'paste', desc: '將多個檔案的行橫向合併', opts: [

      ], ex: '$ paste -d"," file1.txt file2.txt' },
      { name: 'column', desc: '將文字格式化為整齊的表格', opts: [
        ['-t','自動建立表格'], ['-s','指定分隔符']
      ], ex: '$ mount | column -t' },
    ]
  },
  {
    id: 'perm', name: '使用者與權限管理', icon: '🔐',
    color: '#a78bfa',

// Render
const mainEl = document.getElementById('mainContent');
const filterEl = document.getElementById('filterBtns');
const searchEl = document.getElementById('searchInput');

// Build filter buttons
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat.id;
  btn.textContent = cat.name;
  filterEl.appendChild(btn);
});

function renderAll() {
  let html = '';
  CATEGORIES.forEach((cat, ci) => {
    html += `<div class="category" data-cat-id="${cat.id}">
      <div class="category-header">
        <div class="cat-icon" style="background:${cat.color}18;color:${cat.color}">${cat.icon}</div>
        <h2>${cat.name}</h2>
        <span class="cat-count">${cat.commands.length} 條指令</span>
      </div>
      <div class="cmd-grid">`;
    cat.commands.forEach((cmd, i) => {
      const optsHtml = cmd.opts.length ? `<details class="cmd-opts">
        <summary>常用參數 (${cmd.opts.length})</summary>
        <div class="opt-list">${cmd.opts.map(o => `<div class="opt-row"><span class="opt-flag">${escHtml(o[0])}</span><span class="opt-desc">${escHtml(o[1])}</span></div>`).join('')}</div>
      </details>` : '';

      const exLines = cmd.ex.split('\n').map(l => {
        if (l.startsWith('$ ')) return `<span class="prompt">$ </span>${escHtml(l.slice(2))}`;
        if (l.startsWith('#')) return `<span class="comment">${escHtml(l)}</span>`;
        return escHtml(l);
      }).join('\n');

      html += `<div class="cmd-card" data-cat="${cat.id}" data-name="${cmd.name.toLowerCase()}" data-desc="${cmd.desc}" style="animation-delay:${i*30}ms">
        <div class="cmd-top">
          <span class="cmd-name">${escHtml(cmd.name)}</span>
        </div>
        <div class="cmd-desc">${escHtml(cmd.desc)}</div>
        ${optsHtml}
        <div class="cmd-example">${exLines}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  mainEl.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderAll();

// Filter
filterEl.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  filterEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  const cat = e.target.dataset.cat;
  document.querySelectorAll('.category').forEach(sec => {
    sec.style.display = (cat === 'all' || sec.dataset.catId === cat) ? '' : 'none';
  });
});

// Search
searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase().trim();
  document.querySelectorAll('.cmd-card').forEach(card => {
    const name = card.dataset.name;
    const desc = card.dataset.desc;
    const match = !q || name.includes(q) || desc.includes(q);
    card.classList.toggle('hidden', !match);
  });
  // Show/hide categories with no visible cards
  document.querySelectorAll('.category').forEach(sec => {
    const vis = sec.querySelectorAll('.cmd-card:not(.hidden)').length;
    sec.style.display = vis ? '' : 'none';
  });
});

// Back to top
const topBtn = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', window.scrollY > 400);
});
topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
